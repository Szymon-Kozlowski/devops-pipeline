trigger: 
- main 

pool:
  name: 'Default'

steps: 
- task: UsePythonVersion@0
  inputs: 
    versionSpec: '3.13'
  displayName: 'Install Python 3.13'

- script: |
    pip install flask
    python test_app.py
  displayName: 'Run Unit Tests'

- script: |
    docker build -t devops-app:$(Build.BuildId) .
  displayName: 'Build Docker Image'

- script: |
    docker run --rm -v //var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.49.1 image --severity HIGH,CRITICAL devops-app:$(Build.BuildId)
  displayName: 'Scan Image for Vulnerabilities'