trigger: 
- main 

pool:
  name: 'Default'

steps: 
- task: UsePythonVersion@0
  inputs: 
    versionSpec: '3.13'
  displayName: 'Install Python 3.13'

- script: |
    pip install -r requirements.txt
    python test_app.py
  displayName: 'Run Unit Tests'

- script: |
    docker build -t devops-app:$(Build.BuildId) -t devops-app:latest .
  displayName: 'Build Docker Image (numbered and latest)'

- script: |
    docker run --rm -v //var/run/docker.sock:/var/run/docker.sock aquasec/trivy:0.49.1 image --severity HIGH,CRITICAL devops-app:latest
  displayName: 'Scan Latest Image for Vulnerabilities'

- script: |
    docker image prune -f
  displayName: 'Cleanup Unused Docker Layers'
  condition: always() 